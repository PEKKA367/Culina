<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Culina</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/recipe.css">
</head>

<body>
<div class="wrapper">

    <header class="header">
        <div class="container header-content">
            <a href="../index.html" class="logo">
                <img class="logo-img" alt="Culina logo" src="../images/Culina.png">
            </a>

            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link">Пошук</a></li>
                    <li><a href="#" class="nav-link">Категорії</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <button class="btn btn-primary" data-state="view">Редагувати</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="recipe-container">
                <a class="btn-back" href="../index.html">&larr; До рецептів</a>
                <div class="recipe-title"></div>
                <div class="recipe-description"></div>
                <div class="ingredients-and-process-container">
                    <div class="ingredients-block">
                        <h2 class="ingredients-title">Інгредієнти</h2>
                        <ul class="ingredients-list">
                        </ul>
                    </div>
                    <div class="recipe-skin field-indents process"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 Culina | Проєкт Іллі Бугая</p>
        </div>
    </footer>
</div>

<template id="ingredient-and-amount-template">
    <li class="ingredient-and-amount-divider ingredient-and-amount">
        <span class="ingredient"></span>
        <span class="amount"></span>
    </li>
</template>

<script type="module" src="../scripts/view-recipe.js"></script>
<script type="module" src="../scripts/edit-recipe.js"></script>
</body>

</html>
