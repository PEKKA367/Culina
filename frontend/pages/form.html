<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Culina - Додати рецепт</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/form.css">
</head>

<body>
    <div class="wrapper">

        <header class="header">
            <div class="container header-content">
                <a href="../index.html" class="logo">
                    <img class="logo-img" src="../images/Culina.png" alt="Culina Logo">
                </a>

                <nav class="nav">
                    <ul class="nav-list">
                        <li><a href="#" class="nav-link">Пошук</a></li>
                        <li><a href="#" class="nav-link">Категорії</a></li>
                    </ul>
                </nav>

                <div class="header-actions">
                    <button type="reset" class="btn btn-primary">Очистити</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container container-sm">

                <form id="form-recipe" class="form">
                    <div class="form-group">
                        <label for="title-input">Назва рецепту</label>
                        <input class="form-input" type="text" id="title-input" name="title"
                            placeholder="Назва рецепту..." required>
                    </div>

                    <div class="form-group">
                        <label for="description-input">Короткий опис</label>
                        <textarea class="form-input" id="description-input" name="description"
                            placeholder="Опис до страви..." rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Інгредієнти</label>
                        <div id="ingredients-list" class="ingredients-list">
                            <div class="ingredient-row">
                                <input class="form-input ingredient-name" type="text" name="ingredient-name"
                                    placeholder="Інгредієнт">
                                <input class="form-input ingredient-amount" type="text" name="ingredient-amount"
                                    placeholder="Кількість">
                            </div>
                        </div>

                        <button type="button" id="btn-add" class="btn btn-dashed">Додати інгредієнт +</button>
                    </div>

                    <div class="form-group">
                        <label>Процес приготування</label>
                        <div id="steps-list" class="steps-list">
                        </div>
                        <button type="button" id="btn-add-step" class="btn btn-dashed">Додати крок +</button>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Зберегти рецепт</button>
                </form>

            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p class="footer-text">&copy; 2026 Culina | Проєкт Іллі Бугая</p>
            </div>
        </footer>
    </div>

    <template id="ingredient-template">
        <div class="ingredient-row">
            <input class="form-input ingredient-name" type="text" name="ingredient-name" placeholder="Інгредієнт">
            <input class="form-input ingredient-amount" type="text" name="ingredient-amount" placeholder="Кількість">
        </div>
    </template>

    <template id="step-template">
        <div class="step-row">
            <span class="step-number"></span>
            <textarea class="form-input step-input" name="step" placeholder="Опис кроку..." rows="2"></textarea>
            <button type="button" class="btn btn-danger step-delete">⨉</button>
        </div>
    </template>

    <script type="module" src="../scripts/add-recipe.js"></script>
</body>

</html>
